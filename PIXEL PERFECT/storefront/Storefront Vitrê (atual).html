<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vitrê Storefront — recriação do estado atual</title>
<link rel="stylesheet" href="vitre.css" />
<style>
  body { background: #ECE9E2; padding: 40px 0; margin: 0; }
  .frame { background: #ECE9E2; padding: 24px; }
  .ab-frame { width: 100%; height: 100%; background: #ECE9E2; overflow: hidden; display: flex; justify-content: center; padding: 16px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../admin/design-canvas.jsx"></script>
<script type="text/babel" src="../admin/icons.jsx"></script>
<script type="text/babel" src="vitre.jsx"></script>

<script type="text/babel">
  function Canvas() {
    return (
      <DesignCanvas>
        <DCSection id="briefing" title="Storefront Vitrê · estado atual" subtitle="Recriação fiel do canvas-v1 do repo · 6 telas mobile + 1 desktop">
          <DCArtboard id="brief" label="Briefing" width={460} height={892}>
            <div style={{ padding: 36, background: "white", height: "100%", borderRadius: 8, border: "1px solid #E5E5E5", display: "flex", flexDirection: "column", gap: 16, overflow: "auto", fontFamily: "var(--font-sans)" }}>
              <div style={{ width: 44, height: 44, background: "linear-gradient(135deg, #1A3A8F, #3F60C2)", color: "white", borderRadius: 12, display: "inline-flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 22, fontFamily: "var(--font-mono)", letterSpacing: "-0.04em" }}>S</div>
              <h1 style={{ fontSize: 24, fontWeight: 600, letterSpacing: "-0.025em", margin: 0, lineHeight: 1.2 }}>
                Recriei o storefront que vocês têm hoje, fiel ao código.
              </h1>
              <div style={{ fontSize: 13, color: "var(--gray-600)", lineHeight: 1.6 }}>
                <p style={{ margin: "0 0 12px" }}>
                  Baseado em <code>src/components/storefront/*</code> e <code>src/app/(storefront)/[storeSlug]/*</code>.
                </p>
                <div style={{ marginBottom: 12 }}>
                  <b style={{ color: "var(--fg)" }}>Mobile-first (390px):</b>
                  <ul style={{ paddingLeft: 18, margin: "6px 0 0" }}>
                    <li>Home com hero "cover" + cat strip + grid 2-col + promo strip</li>
                    <li>PDP com gallery + thumbs + sizes/colors + meta grid + trust block + sticky CTA</li>
                    <li>Sacola com checkout completo (form + totals + WhatsApp CTA)</li>
                    <li>Sucesso após checkout</li>
                    <li>Categoria com filtros chip</li>
                    <li>Buscar com resultados + buscas populares</li>
                  </ul>
                </div>
                <div style={{ marginBottom: 12 }}>
                  <b style={{ color: "var(--fg)" }}>Bottom-nav "pill" (canvas default):</b>
                  <ul style={{ paddingLeft: 18, margin: "6px 0 0" }}>
                    <li>5 abas: Início · Categorias · Favoritos · Buscar · Sacola</li>
                    <li>Pill ativa 56×26 em color-mix com brand-store</li>
                    <li>Badge na sacola</li>
                  </ul>
                </div>
                <div>
                  <b style={{ color: "var(--fg)" }}>Desktop (≥1024px):</b>
                  <ul style={{ paddingLeft: 18, margin: "6px 0 0" }}>
                    <li>Header sticky 80px (cola pra 56 ao scroll)</li>
                    <li>Logo + nav inline 4 cats + ícones direita</li>
                    <li>Grid 4-col de produtos</li>
                  </ul>
                </div>
              </div>
              <div style={{ marginTop: "auto", padding: 12, background: "#EEF1FB", border: "1px solid #C7D2EE", borderRadius: 8, fontSize: 12, color: "#0E1129" }}>
                <b>Próximo:</b> melhorar este storefront pra alinhar com o admin Dublin novo.
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="home" label="Home mobile" width={460} height={892}>
            <div className="ab-frame"><VtHomeScreen /></div>
          </DCArtboard>

          <DCArtboard id="pdp" label="Produto · PDP" width={460} height={892}>
            <div className="ab-frame"><VtPDPScreen /></div>
          </DCArtboard>

          <DCArtboard id="sacola" label="Sacola · checkout WhatsApp" width={460} height={892}>
            <div className="ab-frame"><VtSacolaScreen /></div>
          </DCArtboard>

          <DCArtboard id="sucesso" label="Pedido enviado" width={460} height={892}>
            <div className="ab-frame"><VtSucessoScreen /></div>
          </DCArtboard>

          <DCArtboard id="categoria" label="Categoria · vestidos" width={460} height={892}>
            <div className="ab-frame"><VtCategoriaScreen /></div>
          </DCArtboard>

          <DCArtboard id="buscar" label="Buscar" width={460} height={892}>
            <div className="ab-frame"><VtBuscarScreen /></div>
          </DCArtboard>
        </DCSection>

        <DCSection id="desk" title="Desktop · ≥1024px" subtitle="Header horizontal estilo Shopify Dawn / Nuvemshop Atlántico">
          <DCArtboard id="home-desk" label="Home desktop" width={1280} height={1100}>
            <div className="ab-frame" style={{ alignItems: "stretch" }}><VtDesktopHomeScreen /></div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  window.__C = Canvas;
  function mount() {
    const root = document.getElementById("root");
    if (!root || root.__mounted) return;
    if (typeof window.VtHomeScreen !== "function") return;
    if (typeof window.DesignCanvas !== "function") return;
    root.__mounted = true;
    ReactDOM.createRoot(root).render(React.createElement(window.__C));
  }
  if (document.readyState === "complete") setTimeout(mount, 0);
  else window.addEventListener("load", () => setTimeout(mount, 0));
  let __t = 0;
  const __p = setInterval(() => { __t++; if (document.getElementById("root")?.__mounted || __t > 60) { clearInterval(__p); return; } mount(); }, 100);
</script>
</body>
</html>
