<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Canvas · Storefront completo · Vitrê / Dublin</title>
<style>
  body, html { margin: 0; background: #f0eee9; }
  iframe { width: 100%; height: 100%; border: none; display: block; background: white; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const SF_DUBLIN = "../storefront/Sandra Brito (Dublin-style).html";
  const SF_VITRE  = "../storefront/Storefront Vitrê (atual).html";
  const ADMIN     = "../admin/Dublin v3 (BAGY-style).html";

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="hero" title="Storefront público — Dublin v3 (atual)" subtitle="Sandra Brito Collection · loja Dublin-style, navy + Geist · catálogo público com checkout via WhatsApp">
          <DCArtboard id="sf-desktop" label="Desktop · 1440 · home" width={1440} height={2400}>
            <iframe src={SF_DUBLIN} style={{ width: 1440, height: 2400, border: "none" }} />
          </DCArtboard>
        </DCSection>

        <DCSection id="mobile-flow" title="Storefront mobile — fluxo completo" subtitle="Home · categoria · busca · sacola — preview iOS 390×844 (grid 4-up renderizado pelo admin)">
          <DCArtboard id="m-grid" label="Mobile · 4 estados" width={1800} height={920}>
            <iframe src={ADMIN + "#/storefront-preview"} style={{ width: 1800, height: 920, border: "none" }} />
          </DCArtboard>
        </DCSection>

        <DCSection id="anterior" title="Versão anterior — Vitrê atual (referência)" subtitle="Iteração prévia, antes do tratamento Dublin · navy + serif">
          <DCArtboard id="vt-desktop" label="Vitrê · desktop 1440" width={1440} height={2200}>
            <iframe src={SF_VITRE} style={{ width: 1440, height: 2200, border: "none" }} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
