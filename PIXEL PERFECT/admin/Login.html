<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dublin · Entrar</title>
<link rel="stylesheet" href="v3/bagy-style.css" />
<style>body { background: white; margin: 0; }</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="v3/bagy-sprint-e.jsx"></script>

<script type="text/babel">
  // Quando a tela tentar location.hash = "..." pra navegar internamente,
  // interceptamos via hashchange e mandamos pra arquivos standalone certos.
  function redirectFromHash() {
    const h = location.hash.slice(1);
    if (!h) return;
    if (h === "/dashboard")    location.href = "Dublin v3 (BAGY-style).html#/dashboard";
    else if (h === "/onboarding") location.href = "Onboarding.html";
    else if (h === "/signup")  location.href = "Dublin v3 (BAGY-style).html#/signup";
  }
  window.addEventListener("hashchange", redirectFromHash);

  function mount() {
    const root = document.getElementById("root");
    if (!root || root.__mounted) return;
    if (typeof window.B3LoginScreen !== "function") return;
    root.__mounted = true;
    ReactDOM.createRoot(root).render(React.createElement(window.B3LoginScreen));
  }
  if (document.readyState === "complete") setTimeout(mount, 0);
  else window.addEventListener("load", () => setTimeout(mount, 0));
  let __t = 0;
  const __p = setInterval(() => {
    __t++;
    if (document.getElementById("root")?.__mounted || __t > 60) { clearInterval(__p); return; }
    mount();
  }, 100);
</script>
</body>
</html>
